# ──────────────────────────────────────────────────────────
# application.yml - Core Backend Configuration
# ──────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: credit-scoring-backend

  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_HOST:postgres}:5432/credit_scoring
    username: ${SPRING_DATASOURCE_USERNAME:credit_user}
    password: ${SPRING_DATASOURCE_PASSWORD:credit_pass_secure_2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false
    show-sql: false

  flyway:
    enabled: false
    baseline-on-migrate: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── AI Service Integration ──────────────────────────────
ai-service:
  url: ${AI_SERVICE_URL:http://ai-service:8001}
  timeout-seconds: 30
  retry-attempts: 3

# ── Actuator ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true

# ── Logging ─────────────────────────────────────────────
logging:
  level:
    com.creditscore: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
